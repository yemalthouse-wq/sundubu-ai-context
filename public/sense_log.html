<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>気づきログ</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f0e6;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
h2 {
  margin-bottom: 20px;
}
.type-buttons button {
  margin-right: 5px;
  padding: 8px 12px;
}
.active {
  background: #333;
  color: #fff;
}
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
.log {
  margin-top: 20px;
}
.item {
  background: #fff;
  padding: 10px;
  margin-bottom: 8px;
  border-left: 4px solid #999;
}
</style>
</head>

<body>
<div class="container">
  <h2>気づきログ</h2>

  <div class="type-buttons">
    <button onclick="setType('違和感')" id="違和感" class="active">違和感</button>
    <button onclick="setType('判断')" id="判断">判断</button>
    <button onclick="setType('改善')" id="改善">改善</button>
  </div>

  <input id="input" placeholder="今感じていること、一行でいい。" />

  <br><br>
  <button onclick="exportLogs()">Export JSON</button>

  <div class="log" id="list"></div>
</div>

<script>
let type = "違和感";
let logs = JSON.parse(localStorage.getItem("sense") || "[]");

function setType(t) {
  type = t;
  document.querySelectorAll(".type-buttons button").forEach(b => b.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  logs.slice().reverse().forEach(l => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = l.type + "： " + l.text;
    list.appendChild(div);
  });
}

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    logs.push({
      timestamp: new Date().toISOString(),
      type,
      text: e.target.value
    });
    localStorage.setItem("sense", JSON.stringify(logs));
    e.target.value = "";
    render();
  }
});

function exportLogs() {
  const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `sense_log_${today}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

render();
</script>

</body>
</html>
