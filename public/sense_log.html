<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>気づきログ</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f0e6;
  padding: 20px;
  color: #2b241c;
}
.container {
  max-width: 560px;
  margin: auto;
}
h2 {
  margin-bottom: 20px;
}
.type-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.type-buttons button {
  flex: 1;
  padding: 12px;
  border: 1px solid #cfc6b8;
  background: #fffdf8;
  color: #3b6fb6;
  border-radius: 8px;
  font-size: 18px;
}
.type-buttons button.active {
  background: #2f2a25;
  color: white;
  border-color: #2f2a25;
}
.panel {
  background: rgba(255,255,255,0.55);
  border: 1px solid #d8d0c3;
  border-radius: 10px;
  padding: 18px;
}
textarea {
  width: 100%;
  min-height: 110px;
  border: none;
  border-bottom: 1px solid #d8d0c3;
  background: transparent;
  resize: vertical;
  font-size: 18px;
  outline: none;
  color: #2b241c;
}
.actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}
.actions button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #2f2a25;
  color: white;
  font-size: 18px;
}
.export-btn {
  background: #6b6257 !important;
}
.log {
  margin-top: 22px;
}
.item {
  background: rgba(255,255,255,0.72);
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 8px;
  border-left: 5px solid #999;
}
.item-header {
  display: flex;
  justify-content: space-between;
  color: #7a746c;
  font-size: 14px;
  margin-bottom: 8px;
}
.type-違和感 { border-left-color: #2f2a25; }
.type-判断   { border-left-color: #4c7dc0; }
.type-改善   { border-left-color: #4d8b63; }
.delete-btn {
  border: none;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
  <h2>気づきログ</h2>

  <div class="panel">
    <div class="type-buttons">
      <button onclick="setType('違和感')" id="違和感" class="active">違和感</button>
      <button onclick="setType('判断')" id="判断">判断</button>
      <button onclick="setType('改善')" id="改善">改善</button>
    </div>

    <textarea id="input" placeholder="今感じていること、一行でいい。"></textarea>

    <div class="actions">
      <button class="export-btn" onclick="exportLogs()">Export JSON</button>
      <button onclick="saveLog()">保存 ↵</button>
    </div>
  </div>

  <div class="log" id="list"></div>
</div>

<script>
let type = "違和感";
let logs = JSON.parse(localStorage.getItem("sense") || "[]");

function setType(t) {
  type = t;
  document.querySelectorAll(".type-buttons button").forEach(b => b.classList.remove("active"));
  document.getElementById(t).classList.add("active");
}

function persist() {
  localStorage.setItem("sense", JSON.stringify(logs));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  logs.slice().reverse().forEach((l, idx) => {
    const actualIndex = logs.length - 1 - idx;
    const div = document.createElement("div");
    div.className = "item type-" + l.type;

    const ts = new Date(l.timestamp);
    const timeText = `${ts.getMonth()+1}/${ts.getDate()} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;

    div.innerHTML = `
      <div class="item-header">
        <span>${l.type}</span>
        <span>${timeText}<button class="delete-btn" onclick="deleteLog(${actualIndex})">×</button></span>
      </div>
      <div>${escapeHtml(l.text)}</div>
    `;
    list.appendChild(div);
  });
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function saveLog() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  logs.push({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    timestamp: new Date().toISOString(),
    type,
    text
  });

  persist();
  input.value = "";
  render();
}

function deleteLog(index) {
  logs.splice(index, 1);
  persist();
  render();
}

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    saveLog();
  }
});

function exportLogs() {
  const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `sense_log_${today}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
